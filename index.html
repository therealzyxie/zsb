    /* Custom animations for the UI */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
      50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
    }
    .animate-bounce { animation: bounce 1s infinite; }

    const getWordsForMode = (mode) => {
      if (mode === 'beginner') return BEGINNER_WORDS;
      if (mode === 'moderate') return MODERATE_WORDS;
      if (mode === 'hard') return HARD_WORDS;
      if (mode === 'extreme') return WORDS;
      if (mode === 'random') return [...BEGINNER_WORDS, ...MODERATE_WORDS, ...HARD_WORDS, ...WORDS];
      return WORDS;
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const playDing = () => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) {
        // Fails silently if browser blocks audio before interaction
      }
    };

    const speakWord = (wordText) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordText);
        utterance.rate = 0.8; 
        window.speechSynthesis.speak(utterance);
      }
    };

    const SummerLights = () => {
      const colors = [
        'bg-orange-400 shadow-[0_0_12px_#fb923c]',
        'bg-sky-400 shadow-[0_0_12px_#38bdf8]', 
        'bg-yellow-300 shadow-[0_0_12px_#fde047]'
      ];
      
      const getColor = (i) => colors[i % colors.length];
      const getDelay = (i) => `${(i % 3) * 0.4}s`;

      const topBottomCount = 14;
      const leftRightCount = 8;

      return (
        <div className="absolute inset-0 pointer-events-none z-20">
          <div className="absolute -top-2 left-4 right-4 flex justify-between">
            {[...Array(topBottomCount)].map((_, i) => (
              <div key={`top-${i}`} className={`w-3.5 h-3.5 rounded-full ${getColor(i)} animate-pulse`} style={{ animationDelay: getDelay(i) }} />
            ))}
          </div>
          <div className="absolute -bottom-2 left-4 right-4 flex justify-between">
            {[...Array(topBottomCount)].map((_, i) => (
              <div key={`bottom-${i}`} className={`w-3.5 h-3.5 rounded-full ${getColor(i + 1)} animate-pulse`} style={{ animationDelay: getDelay(i + 1) }} />
            ))}
          </div>
          <div className="absolute top-6 bottom-6 -left-2 flex flex-col justify-between">
            {[...Array(leftRightCount)].map((_, i) => (
              <div key={`left-${i}`} className={`w-3.5 h-3.5 rounded-full ${getColor(i + 2)} animate-pulse`} style={{ animationDelay: getDelay(i + 2) }} />
            ))}
          </div>
          <div className="absolute top-6 bottom-6 -right-2 flex flex-col justify-between">
            {[...Array(leftRightCount)].map((_, i) => (
              <div key={`right-${i}`} className={`w-3.5 h-3.5 rounded-full ${getColor(i + 3)} animate-pulse`} style={{ animationDelay: getDelay(i + 3) }} />
            ))}
          </div>
        </div>
      );
    };

    function App() {
      const [playStyle, setPlayStyle] = useState('normal'); 
      const [gameState, setGameState] = useState('start'); 
      const [gameMode, setGameMode] = useState('extreme'); 
      
      const [countdownValue, setCountdownValue] = useState(3);
      const [shuffledWords, setShuffledWords] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userInput, setUserInput] = useState('');
      const [startTime, setStartTime] = useState(null);
      const [results, setResults] = useState([]);
      const [isTransitioning, setIsTransitioning] = useState(false);
      const [isLocked, setIsLocked] = useState(false);
      
      const [lastWPM, setLastWPM] = useState(null);
      const [failedWPM, setFailedWPM] = useState(null);
      const [flashError, setFlashError] = useState(false);
      const [streakCount, setStreakCount] = useState(0);
      const [timeTrialLeft, setTimeTrialLeft] = useState(30);
      const [streakLostFlare, setStreakLostFlare] = useState(false);
      
      const [isBanned, setIsBanned] = useState(false);
      const [banTimeLeft, setBanTimeLeft] = useState(0);
      const [banDetails, setBanDetails] = useState([]); 
      const pendingBanRef = useRef(null);
      
      const inputRef = useRef(null);

      useEffect(() => {
        if (gameState === 'play' && playStyle === 'timetrial' && !isBanned) {
          const timer = setInterval(() => {
            setTimeTrialLeft((prev) => {
              if (prev <= 1) {
                clearInterval(timer);
                setGameState('end');
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
          return () => clearInterval(timer);
        }
      }, [gameState, playStyle, isBanned]);

      useEffect(() => {
        if (gameState === 'countdown' && countdownValue > 0) {
          const timer = setTimeout(() => setCountdownValue(prev => prev - 1), 1000);
          return () => clearTimeout(timer);
        } else if (gameState === 'countdown' && countdownValue === 0) {
          setGameState('play');
        }
      }, [gameState, countdownValue]);

      useEffect(() => {
        if (isBanned && banTimeLeft > 0) {
          const timer = setTimeout(() => setBanTimeLeft(prev => prev - 1), 1000);
          return () => clearTimeout(timer);
        }
      }, [isBanned, banTimeLeft]);

      useEffect(() => {
        if (gameState === 'play' && !isTransitioning && shuffledWords.length > 0) {
          setIsLocked(true);
          const lockTimer = setTimeout(() => {
            setIsLocked(false);
          }, playStyle === 'timetrial' ? 350 : 1000); 
          return () => clearTimeout(lockTimer);
        }
      }, [gameState, currentIndex, isTransitioning, shuffledWords, playStyle]);

      useEffect(() => {
        if (gameState === 'play' && !isTransitioning && !isLocked && !isBanned && inputRef.current) {
          inputRef.current.focus();
        }
      }, [gameState, currentIndex, isTransitioning, isLocked, isBanned]);

      useEffect(() => {
        if (gameState === 'play' && !isTransitioning && shuffledWords.length > 0 && !isBanned) {
          speakWord(shuffledWords[currentIndex].accepted[0]);
        }
      }, [gameState, currentIndex, isTransitioning, shuffledWords, isBanned]);

      const startGame = (mode, style = playStyle) => {
        if (pendingBanRef.current) clearTimeout(pendingBanRef.current);
        pendingBanRef.current = null;
        
        setPlayStyle(style);
        setGameMode(mode);
        setShuffledWords(shuffleArray(getWordsForMode(mode)));
        setGameState('countdown');
        setCountdownValue(3);
        setCurrentIndex(0);
        setUserInput('');
        setStartTime(null);
        setResults([]);
        setIsTransitioning(false);
        setIsLocked(false);
        setLastWPM(null);
        setFailedWPM(null);
        setIsBanned(false);
        setBanTimeLeft(0);
        setBanDetails([]);
        setTimeTrialLeft(30);
        setStreakCount(0);
        setStreakLostFlare(false);
      };

      const handleInputChange = (e) => {
        if (isTransitioning || isLocked || isBanned) return;
        const val = e.target.value;
        setUserInput(val);
        setFlashError(false);
        setFailedWPM(null);

        if (!startTime && val.length > 0) {
          setStartTime(Date.now());
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !isTransitioning && !isLocked && !isBanned && userInput.length > 0) {
          const currentWordObj = shuffledWords[currentIndex];
          const normalizedInput = userInput.trim().toLowerCase();

          if (currentWordObj.accepted.includes(normalizedInput)) {
            playDing();
            const endTime = Date.now();
            const timeTakenSec = Math.max(0.01, (endTime - (startTime || Date.now())) / 1000);
            
            const chars = normalizedInput.length;
            const wpm = Math.round((chars / timeTakenSec) * 25);

            setLastWPM(wpm);

            let currentStreak = streakCount + 1;
            setStreakCount(currentStreak);

            let banThreshold = 550;
            if (gameMode === 'random') banThreshold = 500;
            if (gameMode === 'hard') banThreshold = 500;
            if (gameMode === 'extreme') banThreshold = 450;

            if (wpm >= banThreshold && chars >= 7) {
              setBanDetails(prev => [...prev, { wpm: wpm, word: currentWordObj.display }]);
              
              const calculatedBanTime = Math.round(chars + (wpm / 30));
              setBanTimeLeft(prev => prev + calculatedBanTime);
              
              if (!pendingBanRef.current) {
                const randomFactor = Math.pow(Math.random(), 3); 
                const delayMs = Math.floor((1 + (randomFactor * 19)) * 1000);
                
                pendingBanRef.current = setTimeout(() => {
                  setIsBanned(true);
                  pendingBanRef.current = null;
                }, delayMs);
              }
            }

            setResults(prev => [...prev, {
              word: currentWordObj.display,
              typed: normalizedInput,
              wpm: wpm,
              time: timeTakenSec.toFixed(2)
            }]);

            setIsTransitioning(true);

            const gapTime = playStyle === 'timetrial' ? 500 : 2000;

            setTimeout(() => {
              const modes = ['beginner', 'moderate', 'hard', 'extreme'];
              const modeIndex = modes.indexOf(gameMode);

              if (currentStreak >= 30 && modeIndex !== -1 && modeIndex < 3) {
                const nextMode = modes[modeIndex + 1];
                setGameMode(nextMode);
                setShuffledWords(shuffleArray(getWordsForMode(nextMode)));
                setStreakCount(0);
                setCurrentIndex(0);
              } 
              else if (currentStreak >= 30 && gameMode === 'extreme') {
                setGameState('end');
                return;
              } 
              else {
                if (currentIndex + 1 >= shuffledWords.length) {
                  setShuffledWords(shuffleArray(getWordsForMode(gameMode)));
                  setCurrentIndex(0);
                } else {
                  setCurrentIndex(prev => prev + 1);
                }
              }

              setUserInput('');
              setStartTime(null);
              setIsTransitioning(false);
            }, gapTime);

          } else {
            setFlashError(true);
            setTimeout(() => setFlashError(false), 400);
            
            const endTime = Date.now();
            const timeTakenSec = Math.max(0.01, (endTime - (startTime || Date.now())) / 1000);
            const chars = userInput.length;
            const wpm = Math.round((chars / timeTakenSec) * 25);
            setFailedWPM(wpm);

            if (streakCount > 0) {
              setStreakLostFlare(true);
              setTimeout(() => setStreakLostFlare(false), 800);
            }
            setStreakCount(0);
          }
        }
      };

      const isInputError = () => {
        if (userInput.length === 0 || isTransitioning || shuffledWords.length === 0) return false;
        const inputLower = userInput.toLowerCase();
        const currentWordObj = shuffledWords[currentIndex];
        return !currentWordObj.accepted.some(w => w.startsWith(inputLower));
      };

      const getAverageWPM = () => {
        if (results.length === 0) return 0;
        const totalWPM = results.reduce((sum, r) => sum + r.wpm, 0);
        return Math.round(totalWPM / results.length);
      };

      const quitToMenu = () => {
        if (pendingBanRef.current) clearTimeout(pendingBanRef.current);
        pendingBanRef.current = null;
        setGameState('start');
      };

      return (
        <React.Fragment>
          <div className={`min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-4 font-sans transition-all duration-300 ${isBanned ? 'blur-md pointer-events-none brightness-50' : ''}`}>
            
            <div className="mb-8 text-center animate-bounce">
              <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 via-yellow-400 to-sky-400 drop-shadow-[0_0_10px_rgba(251,146,60,0.5)]">
                ☀️ SUMMER UPDATE 🌊
              </h1>
            </div>

            <div className="relative max-w-3xl w-full">
              <SummerLights />
              
              <div className="w-full bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700 relative">
                
                <div className="bg-slate-950 p-6 flex justify-between items-center border-b border-slate-700 z-10 relative">
                  <div className="flex items-center gap-4">
                    <div className="flex items-center gap-2">
                      <Keyboard className="w-6 h-6 text-indigo-400" />
                      <h1 className="text-xl font-bold text-slate-100 hidden sm:block">Extreme Typing</h1>
                    </div>
                    {(gameState === 'play' || gameState === 'countdown') && (
                      <button 
                        onClick={quitToMenu}
                        className="flex items-center gap-1 bg-slate-800 hover:bg-rose-600 text-slate-400 hover:text-white px-3 py-1 rounded-full text-xs font-bold transition-colors border border-slate-700 hover:border-rose-500"
                        title="Exit to Main Menu"
                      >
                        <XIcon className="w-3.5 h-3.5" /> Quit
                      </button>
                    )}
                  </div>
                  
                  <div className="flex gap-3 items-center">
                    {gameState === 'play' && playStyle === 'timetrial' && (
                      <div className="bg-sky-900/50 border border-sky-500/30 px-3 py-1 rounded-lg text-lg font-mono text-sky-400 font-bold flex items-center gap-2 shadow-[0_0_8px_rgba(56,189,248,0.3)]">
                        <Timer className="w-4 h-4" />
                        {timeTrialLeft}s
                      </div>
                    )}
                    {gameState === 'play' && (
                      <div className={`px-3 py-1 rounded-lg text-lg font-mono font-bold flex items-center gap-2 transition-all duration-300 ${
                        streakLostFlare 
                          ? 'bg-rose-900/80 border border-rose-500 text-rose-400 scale-110 animate-shake shadow-[0_0_15px_rgba(244,63,94,0.6)]' 
                          : 'bg-orange-900/50 border border-orange-500/30 text-orange-400 shadow-[0_0_8px_rgba(249,115,22,0.3)]'
                      }`}>
                        <Flame className={`w-4 h-4 ${streakLostFlare ? 'animate-bounce' : ''}`} />
                        {streakCount}/30
                      </div>
                    )}
                  </div>
                </div>

                <div className="p-8 min-h-[450px] flex flex-col justify-center items-center text-center relative z-10">
                  
                  {gameState === 'start' && (
                    <div className="space-y-6 w-full">
                      
                      <div className="bg-slate-900 border border-slate-700 rounded-full p-2 flex flex-col sm:flex-row justify-center max-w-sm mx-auto shadow-inner gap-2 sm:gap-0">
                        <button 
                          onClick={() => setPlayStyle('normal')} 
                          className={`flex-1 py-2 px-4 rounded-full font-bold transition-all ${playStyle === 'normal' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
                        >
                          Normal Mode
                        </button>
                        <button 
                          onClick={() => setPlayStyle('timetrial')} 
                          className={`flex-1 py-2 px-4 rounded-full font-bold transition-all ${playStyle === 'timetrial' ? 'bg-sky-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
                        >
                          Time Trial (30s)
                        </button>
                      </div>

                      <p className="text-slate-400 max-w-md mx-auto min-h-[48px]">
                        Hit a <strong className="text-orange-400">30 Streak</strong> to automatically rank up your difficulty! But be careful—one typo will completely shatter your streak back to 0!
                      </p>

                      <div className="flex flex-col sm:flex-row gap-6 justify-center mt-4 flex-wrap">
                        <div className="flex flex-col items-center gap-2">
                          <span className="text-amber-400 text-xs font-bold bg-amber-900/50 px-2 py-0.5 rounded-full border border-amber-500/30 shadow-[0_0_8px_rgba(245,158,11,0.3)]">+11 New Words!</span>
                          <button 
                            onClick={() => startGame('beginner')}
                            className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-amber-500/30 transition-all flex items-center justify-center gap-2 w-full sm:w-auto"
                          >
                            <Play className="w-5 h-5" /> Beginner
                          </button>
                        </div>

                        <div className="flex flex-col items-center gap-2">
                          <span className="text-sky-400 text-xs font-bold bg-sky-900/50 px-2 py-0.5 rounded-full border border-sky-500/30 shadow-[0_0_8px_rgba(56,189,248,0.3)]">+8 New Words!</span>
                          <button 
                            onClick={() => startGame('moderate')}
                            className="bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-sky-500/30 transition-all flex items-center justify-center gap-2 w-full sm:w-auto"
                          >
                            <Play className="w-5 h-5" /> Moderate
                          </button>
                        </div>

                        <div className="flex flex-col items-center gap-2">
                          <span className="text-emerald-400 text-xs font-bold bg-emerald-900/50 px-2 py-0.5 rounded-full border border-emerald-500/30 shadow-[0_0_8px_rgba(52,211,153,0.3)]">+6 New Words!</span>
                          <button 
                            onClick={() => startGame('hard')}
                            className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-emerald-500/30 transition-all flex items-center justify-center gap-2 w-full sm:w-auto"
                          >
                            <Play className="w-5 h-5" /> Hard
                          </button>
                        </div>

                        <div className="flex flex-col items-center gap-2">
                          <span className="text-indigo-400 text-xs font-bold bg-indigo-900/50 px-2 py-0.5 rounded-full border border-indigo-500/30 shadow-[0_0_8px_rgba(129,140,248,0.3)]">+4 New Words!</span>
                          <button 
                            onClick={() => startGame('extreme')}
                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-indigo-500/30 transition-all flex items-center justify-center gap-2 w-full sm:w-auto"
                          >
                            <Play className="w-5 h-5" /> Extreme
                          </button>
                        </div>

                        <div className="flex flex-col items-center gap-2">
                          <span className="text-fuchsia-400 text-xs font-bold bg-fuchsia-900/50 px-2 py-0.5 rounded-full border border-fuchsia-500/30 shadow-[0_0_8px_rgba(232,121,249,0.3)]">+29 New Words!</span>
                          <button 
                            onClick={() => startGame('random')}
                            className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-fuchsia-500/30 transition-all flex items-center justify-center gap-2 w-full sm:w-auto"
                          >
                            <Play className="w-5 h-5" /> Random
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {gameState === 'countdown' && (
                    <div className="space-y-6">
                      <h2 className="text-6xl font-black text-indigo-400 animate-pulse">{countdownValue}</h2>
                      <p className="text-slate-400 font-medium tracking-widest uppercase">Get Ready...</p>
                    </div>
                  )}

                  {gameState === 'play' && (
                    <div className="space-y-6 w-full">
                      <div className="space-y-2 relative">
                        <div className="flex justify-between items-end">
                          <div className="text-slate-400 font-semibold uppercase tracking-widest text-sm flex gap-2">
                            Type this word: 
                            <span className={`text-xs px-2 rounded font-bold uppercase ${
                              gameMode === 'beginner' ? 'bg-amber-900/50 text-amber-400 border border-amber-500/30' :
                              gameMode === 'moderate' ? 'bg-sky-900/50 text-sky-400 border border-sky-500/30' :
                              gameMode === 'hard' ? 'bg-emerald-900/50 text-emerald-400 border border-emerald-500/30' :
                              gameMode === 'random' ? 'bg-fuchsia-900/50 text-fuchsia-400 border border-fuchsia-500/30' :
                              'bg-indigo-900/50 text-indigo-400 border border-indigo-500/30'
                            }`}>
                              {gameMode} Level
                            </span>
                          </div>
                          {!isTransitioning && shuffledWords.length > 0 && (
                            <button
                              onClick={(e) => {
                                e.preventDefault();
                                speakWord(shuffledWords[currentIndex].accepted[0]);
                                if(inputRef.current) inputRef.current.focus();
                              }}
                              className="flex items-center gap-1.5 text-xs font-bold text-indigo-400 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-full transition-colors border border-slate-700"
                              title="Listen again"
                            >
                              <Volume2 className="w-4 h-4" /> Hear Word
                            </button>
                          )}
                        </div>
                        
                        <div className="bg-slate-900 p-6 rounded-xl border border-slate-700 shadow-inner">
                          <span className={`text-2xl md:text-4xl font-mono tracking-widest break-all select-none transition-colors duration-300 ${isTransitioning ? 'text-emerald-400' : 'text-white'}`}>
                            {shuffledWords.length > 0 && shuffledWords[currentIndex].display}
                          </span>
                        </div>

                        <div className="h-10 flex justify-center items-center">
                          {isTransitioning && lastWPM !== null && (
                            <div className="text-emerald-400 font-bold text-xl flex items-center gap-2 bg-emerald-900/20 px-4 py-1.5 rounded-full border border-emerald-500/30">
                              ✓ Correct! {lastWPM} WPM
                            </div>
                          )}
                          {!isTransitioning && failedWPM !== null && (
                            <div className="text-rose-400 font-bold text-xl flex items-center gap-2 bg-rose-900/20 px-4 py-1.5 rounded-full border border-rose-500/30">
                              ✗ Failed: {failedWPM} WPM
                            </div>
                          )}
                        </div>
                      </div>
                      
                      <div className="w-full max-w-2xl mx-auto min-h-[120px]">
                        {(!isLocked && !isTransitioning) && (
                          <div>
                            <input
                              ref={inputRef}
                              type="text"
                              value={userInput}
                              onChange={handleInputChange}
                              onKeyDown={handleKeyDown}
                              onPaste={(e) => e.preventDefault()}
                              className={`w-full bg-slate-900 border-2 rounded-xl px-4 py-6 text-2xl md:text-3xl font-mono text-center outline-none transition-colors shadow-inner ${
                                flashError 
                                  ? 'border-rose-500 bg-rose-950/30 text-rose-400 animate-shake' 
                                  : isInputError() 
                                    ? 'border-rose-500 text-rose-400 focus:border-rose-500' 
                                    : 'border-slate-600 text-indigo-300 focus:border-indigo-500'
                              }`}
                              placeholder="Start typing..."
                              autoComplete="off"
                              spellCheck="false"
                              autoCorrect="off"
                            />
                            
                            <div className="h-6 flex justify-center mt-3">
                              {isInputError() && (
                                <span className="text-rose-400 text-sm font-semibold animate-pulse">Typo detected! Use backspace.</span>
                              )}
                              {!isInputError() && userInput.length > 0 && (
                                <span className="text-slate-400 text-sm font-semibold">
                                  Press <kbd className="bg-slate-700 px-1.5 py-0.5 rounded text-xs text-white shadow-sm border border-slate-600">Enter ↵</kbd> to submit
                                </span>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {gameState === 'end' && (
                    <div className="space-y-8 w-full max-w-2xl">
                      <h2 className="text-4xl font-extrabold text-white flex items-center justify-center gap-3">
                        <Trophy className="w-10 h-10 text-yellow-400" />
                        {gameMode === 'extreme' && streakCount >= 30 ? 'YOU BEAT EXTREME MODE!' : 'Test Complete!'}
                      </h2>
                      
                      <div className="flex flex-col sm:flex-row gap-4 justify-center">
                        <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 flex flex-col items-center flex-1">
                          <div className="text-6xl font-black text-indigo-400 mb-2">{getAverageWPM()}</div>
                          <div className="text-slate-400 uppercase tracking-widest font-bold">Avg WPM</div>
                        </div>

                        <div className="bg-slate-900 p-8 rounded-2xl border border-slate-700 flex flex-col items-center flex-1">
                          <div className="text-6xl font-black text-orange-400 mb-2">{results.length}</div>
                          <div className="text-slate-400 uppercase tracking-widest font-bold">Words Spelled</div>
                        </div>
                      </div>

                      <div className="max-h-64 overflow-y-auto bg-slate-900 rounded-xl border border-slate-700 p-4 text-left">
                        <table className="w-full text-sm">
                          <thead>
                            <tr className="text-slate-500 border-b border-slate-700">
                              <th className="pb-2 font-medium">Word</th>
                              <th className="pb-2 font-medium text-right">Time (s)</th>
                              <th className="pb-2 font-medium text-right">WPM</th>
                            </tr>
                          </thead>
                          <tbody>
                            {results.map((result, idx) => (
                              <tr key={idx} className="border-b border-slate-800 last:border-0 hover:bg-slate-800/50 transition-colors">
                                <td className="py-2 font-mono text-slate-300 break-all pr-4">{result.word}</td>
                                <td className="py-2 text-right text-slate-400">{result.time}s</td>
                                <td className="py-2 text-right text-indigo-400 font-bold">{result.wpm}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      <div className="flex flex-col sm:flex-row gap-4 justify-center mt-6">
                        <button 
                          onClick={() => startGame(gameMode)}
                          className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all flex items-center justify-center gap-2"
                        >
                          <RotateCcw className="w-5 h-5" /> Play Again
                        </button>
                        <button 
                          onClick={() => setGameState('start')}
                          className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all flex items-center justify-center gap-2"
                        >
                          Main Menu
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* BAN OVERLAY */}
          {isBanned && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
              <div className="bg-[#393B3D] text-white w-full max-w-md shadow-2xl border border-slate-600 font-sans flex flex-col">
                <div className="flex justify-between items-center p-4 border-b border-slate-700 bg-[#2b2d2f]">
                  <h2 className="font-bold text-lg tracking-wide text-gray-100">Disconnected</h2>
                </div>
                <div className="p-8 space-y-6 flex flex-col items-center text-center">
                  <p className="text-gray-300 text-[15px] leading-relaxed">
                    You were kicked from this experience: You have been temporarily banned for suspicious activity. (Error Code: 267)
                  </p>
                  <div className="bg-[#2b2d2f] p-4 w-full text-sm text-gray-400 font-mono text-left border border-slate-700 shadow-inner break-words max-h-48 overflow-y-auto">
                    <span className="text-gray-300 font-bold">Reason:</span> Exceeded human WPM limits.
                    <ul className="mt-2 mb-4 space-y-1 list-disc list-inside text-gray-300">
                      {banDetails.map((detail, idx) => (
                        <li key={idx}>
                          <span className="text-rose-400 font-bold">{detail.wpm} WPM</span> on "{detail.word}"
                        </li>
                      ))}
                    </ul>
                    <span className="text-rose-400 block mt-2">Please wait {banTimeLeft}s before rejoining.</span>
                  </div>
                </div>
                <div className="p-4 border-t border-slate-700 bg-[#2b2d2f] flex justify-center">
                  <button
                    disabled={banTimeLeft > 0}
                    onClick={() => { setIsBanned(false); setGameState('start'); }}
                    className="bg-white text-black font-bold py-2 px-12 rounded shadow disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-200 transition-colors"
                  >
                    {banTimeLeft > 0 ? `Leave (${banTimeLeft})` : 'Leave'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
